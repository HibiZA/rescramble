services:
  rescramble:
    build: .
    container_name: rescramble
    restart: always
    expose:
      - "80"
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
    mem_limit: 64m
    cpus: 0.5
    networks:
      - web

  caddy:
    image: caddy:alpine
    container_name: rescramble-caddy
    restart: always
    ports:
      - "65.108.211.204:80:80"
      - "65.108.211.204:443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web

volumes:
  caddy_data:
  caddy_config:

networks:
  web:
